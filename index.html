function setMode(mode) {
  searchMode = mode;

  // Quitar estado activo
  document.getElementById("btnTitle").classList.remove("active");
  document.getElementById("btnLyrics").classList.remove("active");

  // Activar el seleccionado
  if (mode === "title") {
    document.getElementById("btnTitle").classList.add("active");
  } else {
    document.getElementById("btnLyrics").classList.add("active");
  }

  renderList(document.getElementById("search").value);
}
  
function normalizar(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function renderList(filter = "") {
  const container = document.getElementById("songList");
  container.innerHTML = "";

  const filtro = normalizar(filter);

  let resultados = [];

  if (searchMode === "title") {
    resultados = songs.filter(s =>
      normalizar(s).includes(filtro)
    );
  } else {
    resultados = songs.filter(s =>
      normalizar(lyrics[s] || "").includes(filtro)
    );
  }

  resultados.forEach(song => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song;
    div.onclick = () => openSong(song);
    container.appendChild(div);
  });
}

function openSong(song) {
  document.getElementById("songTitle").innerText = song;
  document.getElementById("lyricsContent").innerText =
    lyrics[song] || "⚠️ Letra no encontrada";

  switchScreen("lyricsScreen");
}

function goBack() {
  switchScreen("listScreen");
}

function switchScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function changeFont(change) {
  fontSize += change;
  document.getElementById("lyricsContent").style.fontSize = fontSize + "px";
}

document.getElementById("search").addEventListener("input", e => {
  renderList(e.target.value);
});

renderList();
